<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Touro MD — Campaigns</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f13;--surface:#18181f;--card:#1e1e28;--border:#2a2a38;
  --accent:#f0c040;--green:#3ddc84;--red:#ff5f5f;--orange:#ff9a3c;
  --blue:#4da6ff;--purple:#a78bfa;--text:#f0f0f5;--muted:#7070a0;
  --display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;padding-bottom:30px;}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.header-title{font-family:var(--display);font-size:26px;letter-spacing:.05em;}
.header-sub{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.back-link{font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;background:var(--card);padding:5px 10px;border-radius:8px;border:1px solid var(--border);}

/* Agent selector */
.agent-select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--body);font-size:14px;padding:8px 12px;border-radius:10px;appearance:none;margin-top:6px;}

/* Views */
.view{display:none;padding:12px 14px;}.view.active{display:block;}

/* Section */
.sec-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);padding:4px 0 6px;border-top:1px solid var(--border);margin:14px 0 8px;}
.sec-label:first-child{border-top:none;margin-top:0;}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:var(--display);font-size:22px;letter-spacing:.05em;margin-bottom:6px;}
.empty-sub{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* Campaign card */
.camp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.camp-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.camp-type-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.06em;display:inline-block;margin-bottom:6px;}
.ct-free_sample{background:rgba(61,220,132,.15);color:var(--green);}
.ct-birthday_gift{background:rgba(167,139,250,.15);color:var(--purple);}
.ct-promotion{background:rgba(240,192,64,.15);color:var(--accent);}
.ct-festive_gift{background:rgba(255,154,60,.15);color:var(--orange);}
.ct-other{background:rgba(77,166,255,.15);color:var(--blue);}
.camp-name{font-family:var(--display);font-size:22px;letter-spacing:.05em;line-height:1.1;margin-bottom:4px;}
.camp-desc{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;}
.camp-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.camp-meta-item{font-family:var(--mono);font-size:9px;color:var(--muted);}
.camp-deadline{font-family:var(--mono);font-size:9px;}
.deadline-ok{color:var(--green);}
.deadline-soon{color:var(--orange);}
.deadline-overdue{color:var(--red);}

/* Progress bar */
.camp-progress{padding:12px 16px;border-bottom:1px solid var(--border);}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-pct{font-family:var(--display);font-size:22px;letter-spacing:.03em;}
.prog-count{font-family:var(--mono);font-size:10px;color:var(--muted);}
.prog-bar-bg{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}

/* Debtor list in campaign */
.camp-list{padding:8px 0;}
.camp-debtor-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;}
.camp-debtor-row:last-child{border-bottom:none;}
.camp-debtor-info{flex:1;min-width:0;}
.camp-debtor-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-debtor-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.status-toggle{display:flex;gap:6px;flex-shrink:0;}
.st-btn{font-family:var(--mono);font-size:9px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.st-btn.active-visited{background:rgba(61,220,132,.2);border-color:var(--green);color:var(--green);}
.st-btn.active-failed{background:rgba(255,95,95,.2);border-color:var(--red);color:var(--red);}

/* Sheet overlay */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;padding:20px 18px 30px;width:100%;transform:translateY(100%);transition:transform .25s ease;}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-family:var(--display);font-size:22px;letter-spacing:.05em;margin-bottom:4px;}
.sheet-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:16px;}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;}
.ftab{font-family:var(--mono);font-size:9px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
.ftab.active{background:var(--accent);color:#000;border-color:var(--accent);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.camp-card{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<div class="header">
  <!-- Cross-page nav -->
  <div style="display:flex;gap:10px;align-items:center;overflow-x:auto;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px;">
    <span style="font-family:var(--mono);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;">Go to:</span>
    <a href="?page=agent" style="font-family:var(--mono);font-size:9px;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(77,166,255,.3);border-radius:6px;white-space:nowrap;">👥 Agent</a>
    <a href="?page=management" style="font-family:var(--mono);font-size:9px;color:var(--purple);text-decoration:none;padding:3px 8px;border:1px solid rgba(167,139,250,.3);border-radius:6px;white-space:nowrap;">📊 Management</a>
    <a href="?page=admin" style="font-family:var(--mono);font-size:9px;color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid rgba(240,192,64,.3);border-radius:6px;white-space:nowrap;">⚙ Admin</a>
  </div>
  <div class="header-top">
    <div>
      <div class="header-title">CAMPAIGNS</div>
      <div class="header-sub">Marketing Tasks</div>
    </div>
    <a href="?page=agent" class="back-link">← Dashboard</a>
  </div>
  <select class="agent-select" id="agent-select" onchange="selectAgent(this.value)">
    <option value="">— Select Agent —</option>
  </select>
</div>

<!-- ── No Agent Selected ── -->
<div id="view-no-agent" class="view active">
  <div class="empty-state" style="margin-top:40px;">
    <div class="empty-icon">📋</div>
    <div class="empty-title">Select Agent</div>
    <div class="empty-sub">Choose your name above to see your campaign tasks</div>
  </div>
</div>

<!-- ── Main Campaign View ── -->
<div id="view-main" class="view">

  <div id="active-campaigns"></div>

</div>


<!-- ── Debtor List Sheet ── -->
<div class="sheet-overlay" id="camp-sheet" onclick="closeCampSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-camp-name">—</div>
    <div class="sheet-sub" id="sheet-camp-sub">—</div>

    <div class="filter-tabs">
      <button class="ftab active" onclick="setCampFilter('all',this)">All</button>
      <button class="ftab" onclick="setCampFilter('pending',this)">⬜ Pending</button>
      <button class="ftab" onclick="setCampFilter('visited',this)">✅ Visited</button>
      <button class="ftab" onclick="setCampFilter('failed',this)">❌ Failed</button>
    </div>

    <div id="sheet-debtor-list" style="max-height:55vh;overflow-y:auto;"></div>
  </div>
</div>


<script>
// ── State ──────────────────────────────────────────────────────────────────
let CAMPAIGNS = [];
let DASHBOARD_DATA = null;
let currentAgent = null;
let currentCampId = null;
let campFilter = 'all';

const CAMP_TYPES = {
  free_sample:  {label:'Free Sample',   emoji:'🎁', css:'ct-free_sample'},
  birthday_gift:{label:'Birthday Gift', emoji:'🎂', css:'ct-birthday_gift'},
  promotion:    {label:'Promotion',     emoji:'📢', css:'ct-promotion'},
  festive_gift: {label:'Festive Gift',  emoji:'🧧', css:'ct-festive_gift'},
  other:        {label:'Other',         emoji:'📋', css:'ct-other'},
};

// ── Storage (Streamlit persistent storage API) ─────────────────────────────
async function saveProgress(agent, campId, debtorCode, status) {
  const key = `camp_${campId}_${agent}`;
  try {
    // Load existing progress for this agent+campaign
    let existing = {};
    try {
      const r = await window.storage.get(key);
      if (r) existing = JSON.parse(r.value);
    } catch(e) {}
    existing[debtorCode] = { status, updated_at: new Date().toISOString() };
    await window.storage.set(key, JSON.stringify(existing));
  } catch(e) {
    // Fallback to localStorage
    const lsKey = `camp_${campId}_${agent}`;
    const existing = JSON.parse(localStorage.getItem(lsKey)||'{}');
    existing[debtorCode] = { status, updated_at: new Date().toISOString() };
    localStorage.setItem(lsKey, JSON.stringify(existing));
  }
}

async function loadProgress(agent, campId) {
  const key = `camp_${campId}_${agent}`;
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : {};
  } catch(e) {
    return JSON.parse(localStorage.getItem(key)||'{}');
  }
}

async function loadAllProgress(campId, agents) {
  const result = {};
  for (const agent of agents) {
    result[agent] = await loadProgress(agent, campId);
  }
  return result;
}

// ── Load Data ──────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [campRes, dashRes] = await Promise.all([
      fetch('campaigns.json'),
      fetch('dashboard_data.json')
    ]);
    const campData = await campRes.json();
    CAMPAIGNS = (campData.campaigns || []).filter(c => c.active);
    DASHBOARD_DATA = await dashRes.json();

    // Populate agent dropdown
    const sel = document.getElementById('agent-select');
    Object.keys(DASHBOARD_DATA.agents || {}).sort().forEach(a => {
      const opt = document.createElement('option');
      opt.value = a; opt.textContent = a;
      sel.appendChild(opt);
    });

    // Auto-select from localStorage
    const saved = localStorage.getItem('touro_selected_agent');
    if (saved && DASHBOARD_DATA.agents[saved]) {
      sel.value = saved;
      selectAgent(saved);
    }
  } catch(e) {
    document.getElementById('view-no-agent').innerHTML = `
      <div class="empty-state" style="margin-top:40px;">
        <div class="empty-icon">❌</div>
        <div class="empty-title">Load Error</div>
        <div class="empty-sub">${e.message}</div>
      </div>`;
  }
}

// ── Agent Selection ────────────────────────────────────────────────────────
async function selectAgent(agent) {
  currentAgent = agent;
  if (agent) localStorage.setItem('touro_selected_agent', agent);

  if (!agent) {
    document.getElementById('view-no-agent').classList.add('active');
    document.getElementById('view-main').classList.remove('active');
    return;
  }
  document.getElementById('view-no-agent').classList.remove('active');
  document.getElementById('view-main').classList.add('active');
  await renderCampaigns();
}

// ── Render Campaigns ───────────────────────────────────────────────────────
async function renderCampaigns() {
  const container = document.getElementById('active-campaigns');

  if (!CAMPAIGNS.length) {
    container.innerHTML = `<div class="empty-state" style="margin-top:20px;">
      <div class="empty-icon">🎉</div>
      <div class="empty-title">No Active Campaigns</div>
      <div class="empty-sub">Marketing hasn't created any campaigns yet</div>
    </div>`;
    return;
  }

  const html = [];
  for (const camp of CAMPAIGNS) {
    const progress = await loadProgress(currentAgent, camp.id);
    const debtors  = camp.debtors || [];
    const visited  = debtors.filter(d => progress[d.code]?.status === 'visited').length;
    const failed   = debtors.filter(d => progress[d.code]?.status === 'failed').length;
    const pending  = debtors.length - visited - failed;
    const pct      = debtors.length ? Math.round(visited/debtors.length*100) : 0;
    const type     = CAMP_TYPES[camp.type] || CAMP_TYPES.other;

    // Deadline
    const today    = new Date();
    const deadline = new Date(camp.deadline);
    const daysLeft = Math.ceil((deadline - today)/(1000*60*60*24));
    const dlClass  = daysLeft < 0 ? 'deadline-overdue' : daysLeft <= 3 ? 'deadline-soon' : 'deadline-ok';
    const dlText   = daysLeft < 0 ? `Overdue ${Math.abs(daysLeft)}d` : daysLeft === 0 ? 'Due today!' : `${daysLeft}d left`;

    const barColor = pct >= 80 ? '#3ddc84' : pct >= 50 ? '#f0c040' : '#4da6ff';

    html.push(`<div class="camp-card">
      <div class="camp-header">
        <span class="camp-type-badge ${type.css}">${type.emoji} ${type.label}</span>
        <div class="camp-name">${camp.name}</div>
        ${camp.description ? `<div class="camp-desc">${camp.description}</div>` : ''}
        ${camp.brands?.length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin:6px 0;">
          ${camp.brands.map(b=>`<span style="font-family:var(--mono);font-size:9px;background:rgba(255,154,60,.15);color:#ff9a3c;padding:2px 8px;border-radius:8px;border:1px solid rgba(255,154,60,.3);">${b}</span>`).join('')}
        </div>` : ''}
        ${camp.promo_detail ? `<div style="background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);border-radius:8px;padding:8px 10px;margin:6px 0;">
          <div style="font-family:var(--mono);font-size:8px;color:#3ddc84;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">Promotion</div>
          <div style="font-family:var(--mono);font-size:12px;font-weight:600;color:#3ddc84;">${camp.promo_detail}</div>
          ${camp.min_order_ctn?`<div style="font-family:var(--mono);font-size:9px;color:#7070a0;margin-top:2px;">Min order: ${camp.min_order_ctn} CTN</div>`:''}
        </div>` : ''}
        <div class="camp-meta">
          <span class="camp-meta-item">📋 ${debtors.length} debtors</span>
          <span class="camp-deadline ${dlClass}">⏰ ${dlText}</span>
        </div>
      </div>
      <div class="camp-progress">
        <div class="prog-row">
          <div>
            <div class="prog-pct" style="color:${barColor}">${pct}%</div>
            <div class="prog-count">${visited} visited · ${failed} failed · ${pending} pending</div>
          </div>
          <button onclick="openCampSheet('${camp.id}')" style="background:var(--accent);color:#000;border:none;font-family:var(--display);font-size:16px;letter-spacing:.05em;padding:8px 16px;border-radius:10px;cursor:pointer;">
            UPDATE
          </button>
        </div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
      </div>
    </div>`);
  }

  container.innerHTML = html.join('') || `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">All Done!</div><div class="empty-sub">No active campaigns</div></div>`;
}

// ── Campaign Sheet ─────────────────────────────────────────────────────────
async function openCampSheet(campId) {
  currentCampId = campId;
  campFilter = 'all';
  document.querySelectorAll('.ftab').forEach((t,i) => t.classList.toggle('active', i===0));

  const camp = CAMPAIGNS.find(c => c.id === campId);
  if (!camp) return;

  document.getElementById('sheet-camp-name').textContent = camp.name;
  document.getElementById('sheet-camp-sub').textContent  =
    `${camp.debtors?.length||0} debtors · Tap to mark visited or failed`;

  await renderSheetDebtors(camp);
  document.getElementById('camp-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function renderSheetDebtors(camp) {
  if (!camp) camp = CAMPAIGNS.find(c => c.id === currentCampId);
  if (!camp) return;

  const progress = await loadProgress(currentAgent, camp.id);
  const debtors  = camp.debtors || [];

  let filtered = debtors;
  if (campFilter === 'pending')  filtered = debtors.filter(d => !progress[d.code]?.status);
  if (campFilter === 'visited')  filtered = debtors.filter(d => progress[d.code]?.status === 'visited');
  if (campFilter === 'failed')   filtered = debtors.filter(d => progress[d.code]?.status === 'failed');

  // Enrich with debtor info from dashboard data
  const allDebtors = currentAgent && DASHBOARD_DATA?.agents[currentAgent]?.debtor_cards?.debtors || [];
  const debtorMap  = Object.fromEntries(allDebtors.map(d => [d.debtor_code, d]));

  const html = filtered.map(d => {
    const info   = debtorMap[d.code] || {};
    const status = progress[d.code]?.status || 'pending';
    const name   = info.company_name || d.name || d.code;
    const type   = info.debtor_type  || '';
    const phone  = info.phone && info.phone !== 'nan' ? info.phone : '';

    return `<div class="camp-debtor-row" id="row-${d.code}">
      <div class="camp-debtor-info">
        <div class="camp-debtor-name">${name}</div>
        <div class="camp-debtor-meta">${d.code}${type?' · '+type:''}${phone?' · 📞'+phone:''}</div>
      </div>
      <div class="status-toggle">
        <button class="st-btn ${status==='visited'?'active-visited':''}"
          onclick="toggleStatus('${camp.id}','${d.code}','visited')">✅</button>
        <button class="st-btn ${status==='failed'?'active-failed':''}"
          onclick="toggleStatus('${camp.id}','${d.code}','failed')">❌</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sheet-debtor-list').innerHTML = html ||
    `<div style="padding:20px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--muted);">No debtors in this filter</div>`;
}

async function toggleStatus(campId, debtorCode, newStatus) {
  const progress = await loadProgress(currentAgent, campId);
  const current  = progress[debtorCode]?.status;
  // Toggle — tap same button again to clear
  const status = current === newStatus ? null : newStatus;

  await saveProgress(currentAgent, campId, debtorCode, status);

  // Update button states immediately
  const row = document.getElementById(`row-${debtorCode}`);
  if (row) {
    const btns = row.querySelectorAll('.st-btn');
    btns[0].className = `st-btn ${status==='visited'?'active-visited':''}`;
    btns[1].className = `st-btn ${status==='failed'?'active-failed':''}`;
  }

  // Refresh campaign card progress in background
  renderCampaigns();
}

async function setCampFilter(filter, btn) {
  campFilter = filter;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  await renderSheetDebtors();
}

function closeCampSheet(e) {
  if (e && e.target !== document.getElementById('camp-sheet')) return;
  document.getElementById('camp-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Boot ───────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
